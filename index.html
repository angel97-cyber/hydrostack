<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HydroStack — Every word has a symbol</title>
  <meta name="description" content="Type any word and reveal its unique symbol. Free and instant." />
  <meta property="og:title" content="HydroStack — Every word has a symbol" />
  <meta property="og:description" content="Type any word. Get a unique symbol. Yours forever." />
  <meta property="og:url" content="https://usehydrostack.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #05050a;
      --text:   #d8d8e8;
      --muted:  #38384f;
      --dim:    #1a1a26;
      --accent: #7c8cf8;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 5rem 1.5rem 4rem;
      overflow-x: hidden;
      cursor: crosshair;
    }

    /* Noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      z-index: 10;
    }

    .wordmark {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .tagline {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-style: italic;
    }

    .main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      width: 100%;
    }

    /* Canvas */
    .canvas-wrap {
      position: relative;
      width: min(440px, 86vw);
      height: min(440px, 86vw);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      transition: opacity 0.5s ease;
    }

    .canvas-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    .canvas-hint span {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Input */
    .input-wrap {
      position: relative;
      width: min(380px, 82vw);
    }

    #wordInput {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--dim);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 2.2rem;
      font-weight: 300;
      text-align: center;
      padding: 0.3rem 0 0.6rem;
      outline: none;
      letter-spacing: 0.06em;
      transition: border-color 0.4s;
      caret-color: var(--accent);
    }

    #wordInput::placeholder {
      color: var(--muted);
      font-size: 1rem;
      font-style: italic;
      letter-spacing: 0.08em;
    }

    #wordInput:focus {
      border-bottom-color: var(--accent);
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 0.75rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s, transform 0.35s;
      pointer-events: none;
    }

    .actions.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    button {
      padding: 0.5rem 1.4rem;
      border-radius: 3px;
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--dim);
      background: transparent;
      color: var(--muted);
      transition: all 0.22s;
    }

    button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
      font-weight: 700;
    }

    button.primary:hover {
      opacity: 0.82;
      color: var(--bg);
    }

    /* Share URL */
    #shareUrl {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      min-height: 1.2em;
      opacity: 0.7;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dim);
      font-style: italic;
      z-index: 1;
    }
  </style>
</head>
<body>

<header>
  <span class="wordmark">HydroStack</span>
  <span class="tagline">every word has a symbol</span>
</header>

<div class="main">
  <div class="canvas-wrap">
    <canvas id="c" width="500" height="500"></canvas>
    <div class="canvas-hint" id="hint">
      <span>type to reveal</span>
    </div>
  </div>

  <div class="input-wrap">
    <input
      id="wordInput"
      type="text"
      placeholder="your name, a word, anything…"
      autocomplete="off"
      spellcheck="false"
      maxlength="60"
    />
  </div>

  <div class="actions" id="act">
    <button id="copyBtn">Copy Link</button>
    <button class="primary" id="dlBtn">Download PNG</button>
  </div>

  <div id="shareUrl"></div>
</div>

<footer>usehydrostack.com</footer>

<script>
/* ── FNV-1a hash ──────────────────────────────────────────── */
function hash(s) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619) >>> 0;
  }
  return h;
}

/* ── Mulberry32 seeded RNG ────────────────────────────────── */
function rngFrom(seed) {
  let s = seed >>> 0;
  return () => {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* ── Canvas helpers ───────────────────────────────────────── */
function ring(ctx, cx, cy, r) {
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
}
function fillDot(ctx, x, y, r) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
}
function polygon(ctx, cx, cy, r, sides, off) {
  ctx.beginPath();
  for (let i = 0; i <= sides; i++) {
    const a  = off + (i / sides) * Math.PI * 2;
    const px = cx + Math.cos(a) * r;
    const py = cy + Math.sin(a) * r;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath(); ctx.stroke();
}

/* ── Core glyph draw function ─────────────────────────────── */
function draw(cvs, text) {
  const ctx = cvs.getContext('2d');
  const W   = cvs.width;
  ctx.clearRect(0, 0, W, W);
  if (!text.trim()) return;

  const t    = text.trim().toLowerCase();
  const seed = hash(t);
  const r    = rngFrom(seed);

  /* Color palette from seed */
  const hue   = seed % 360;
  const sat   = 48 + r() * 35;
  const lit   = 60 + r() * 20;
  const solid = `hsl(${hue},${sat}%,${lit}%)`;

  /* Expose to CSS for theming UI */
  document.documentElement.style.setProperty('--accent', solid);

  const cx = W / 2, cy = W / 2;
  const R  = W * 0.415;
  const lw = Math.max(1, W * 0.003);

  ctx.strokeStyle = solid;
  ctx.fillStyle   = solid;
  ctx.lineWidth   = lw;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  /* Glyph parameters from RNG */
  const spokes   = 3 + Math.floor(r() * 5);   // 3–7
  const sOff     = r() * Math.PI * 2;
  const iRatio   = 0.40 + r() * 0.30;
  const innerR   = R * iRatio;
  const fullSpoke= r() > 0.42;

  /* ── Layer 1: Outer ring ── */
  ring(ctx, cx, cy, R);

  /* ── Layer 2: Double outer ring (sometimes) ── */
  if (r() > 0.5) {
    ctx.globalAlpha = 0.3;
    ring(ctx, cx, cy, R * 0.94);
    ctx.globalAlpha = 1;
  }

  /* ── Layer 3: Spokes ── */
  for (let i = 0; i < spokes; i++) {
    const a = sOff + (i / spokes) * Math.PI * 2;
    const x1 = fullSpoke ? cx : cx + Math.cos(a) * innerR;
    const y1 = fullSpoke ? cy : cy + Math.sin(a) * innerR;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(cx + Math.cos(a) * R, cy + Math.sin(a) * R);
    ctx.stroke();
  }

  /* ── Layer 4: Inner ring ── */
  ring(ctx, cx, cy, innerR);

  /* ── Layer 5: Inscribed polygon ── */
  if (r() > 0.28) {
    const sides = 3 + Math.floor(r() * 5);
    const pR    = R * (0.60 + r() * 0.24);
    const pOff  = r() * Math.PI * 2;
    polygon(ctx, cx, cy, pR, sides, pOff);
  }

  /* ── Layer 6: Dots at inner-ring / spoke intersections ── */
  if (r() > 0.38) {
    for (let i = 0; i < spokes; i++) {
      const a = sOff + (i / spokes) * Math.PI * 2;
      fillDot(ctx, cx + Math.cos(a) * innerR, cy + Math.sin(a) * innerR, lw * 2.4);
    }
  }

  /* ── Layer 7: Mid-arc accents between spokes ── */
  if (r() > 0.48) {
    const aR = R * (0.60 + r() * 0.22);
    ctx.globalAlpha = 0.32;
    for (let i = 0; i < spokes; i++) {
      const a1   = sOff + (i / spokes) * Math.PI * 2;
      const a2   = sOff + ((i + 1) / spokes) * Math.PI * 2;
      const mid  = (a1 + a2) / 2;
      const span = (a2 - a1) * 0.48;
      ctx.beginPath();
      ctx.arc(cx, cy, aR, mid - span, mid + span);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  /* ── Layer 8: Tick marks on outer ring ── */
  if (r() > 0.52) {
    const ticks    = spokes * (1 + Math.floor(r() * 2));
    const perSpoke = Math.round(ticks / spokes);
    for (let i = 0; i < ticks; i++) {
      const a    = (i / ticks) * Math.PI * 2;
      const long = i % perSpoke === 0;
      ctx.globalAlpha = long ? 1 : 0.3;
      const inner = R * (long ? 0.89 : 0.95);
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * inner, cy + Math.sin(a) * inner);
      ctx.lineTo(cx + Math.cos(a) * R,     cy + Math.sin(a) * R);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  /* ── Layer 9: Central symbol ── */
  const cR   = R * (0.08 + r() * 0.10);
  const kind = r();
  if (kind < 0.30) {
    /* Filled disc */
    fillDot(ctx, cx, cy, cR);
  } else if (kind < 0.62) {
    /* Small polygon */
    const cs   = 3 + Math.floor(r() * 4);
    const cOff = r() * Math.PI * 2;
    polygon(ctx, cx, cy, cR, cs, cOff);
  } else {
    /* Crosshair / star arms */
    const arms = 2 + Math.floor(r() * 3);
    for (let i = 0; i < arms; i++) {
      const a = (i / arms) * Math.PI;
      ctx.beginPath();
      ctx.moveTo(cx - Math.cos(a) * cR * 2.2, cy - Math.sin(a) * cR * 2.2);
      ctx.lineTo(cx + Math.cos(a) * cR * 2.2, cy + Math.sin(a) * cR * 2.2);
      ctx.stroke();
    }
  }
}

/* ── UI wiring ────────────────────────────────────────────── */
const cvs     = document.getElementById('c');
const inp     = document.getElementById('wordInput');
const act     = document.getElementById('act');
const hint    = document.getElementById('hint');
const shareEl = document.getElementById('shareUrl');
let   cur     = '';

function render(val) {
  cur = val;
  draw(cvs, val);
  const has = val.trim().length > 0;
  hint.style.opacity = has ? '0' : '1';
  act.classList.toggle('show', has);
  if (has) {
    const enc = encodeURIComponent(val);
    history.replaceState(null, '', '#' + enc);
    shareEl.textContent = 'usehydrostack.com/#' + enc;
  } else {
    history.replaceState(null, '', location.pathname);
    shareEl.textContent = '';
  }
}

inp.addEventListener('input', e => render(e.target.value));

/* Copy shareable link */
document.getElementById('copyBtn').addEventListener('click', () => {
  const url = 'https://usehydrostack.com/#' + encodeURIComponent(cur);
  navigator.clipboard.writeText(url).then(() => {
    const b = document.getElementById('copyBtn');
    const prev = b.textContent;
    b.textContent = 'Copied ✓';
    setTimeout(() => b.textContent = prev, 2000);
  });
});

/* Download 1000×1000 PNG */
document.getElementById('dlBtn').addEventListener('click', () => {
  const exp = document.createElement('canvas');
  exp.width = exp.height = 1000;
  const ec = exp.getContext('2d');

  /* Dark background */
  ec.fillStyle = '#05050a';
  ec.fillRect(0, 0, 1000, 1000);

  /* Draw glyph at 1000px */
  draw(exp, cur);

  /* Watermark */
  ec.font        = '16px "Space Mono", monospace';
  ec.fillStyle   = 'rgba(255,255,255,0.12)';
  ec.textAlign   = 'center';
  ec.letterSpacing = '0.1em';
  ec.fillText('usehydrostack.com', 500, 980);

  const a    = document.createElement('a');
  a.href     = exp.toDataURL('image/png');
  a.download = 'hydrostack-' + cur.replace(/\s+/g, '-').toLowerCase() + '.png';
  a.click();
});

/* Load from URL hash on page open (shareable links) */
const fromHash = decodeURIComponent(location.hash.slice(1));
if (fromHash) {
  inp.value = fromHash;
  render(fromHash);
}
</script>
</body>
</html>
