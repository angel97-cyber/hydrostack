<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HydroStack — Daily Liquid Sort Puzzle</title>
  <meta name="description" content="A new liquid sort puzzle every day. Pour, sort, share your streak. Free in your browser." />
  <meta property="og:title" content="HydroStack — Daily Liquid Sort Puzzle" />
  <meta property="og:description" content="A new puzzle every day. Sort the colors. Share your streak." />
  <meta property="og:url" content="https://usehydrostack.com" />
  <meta name="theme-color" content="#0d1421" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="wordmark">HYDROSTACK</div>
  <div class="puzzle-info">
    <span>Puzzle <strong id="puzzleNum">#1</strong></span>
    <span>Streak <strong id="streakNum">0</strong>🔥</span>
  </div>
</header>

<p class="instructions">Tap a tube to lift it. Tap another to pour. Sort each tube into one color.</p>

<div class="tubes" id="tubes"></div>

<div class="moves-line">Moves <strong id="moveCount">0</strong></div>

<div class="controls">
  <button id="undoBtn">↶ Undo</button>
  <button id="resetBtn">↻ Reset</button>
  <button id="freeBtn">Free Play</button>
  <button id="dailyBtn">Today's Puzzle</button>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>Solved! 🎉</h2>
    <p class="modal-sub">Beautiful sorting work.</p>
    <div class="stats">
      <div class="stat">
        <span class="stat-num" id="winMoves">0</span>
        <span class="stat-label">Moves</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="winStreak">0</span>
        <span class="stat-label">Streak</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="winTotal">0</span>
        <span class="stat-label">Total Solved</span>
      </div>
    </div>
    <div class="share-grid" id="shareGrid"></div>
    <div class="modal-actions">
      <button id="shareBtn" class="primary">📋 Copy Share</button>
      <button id="nextBtn">Next Puzzle →</button>
    </div>
    <button class="close-x" id="closeModalBtn" aria-label="Close">×</button>
  </div>
</div>

<footer>usehydrostack.com · a new puzzle every day</footer>

<script src="game.js"></script>
</body>
</html>
